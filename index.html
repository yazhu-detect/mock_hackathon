<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadr Auto-Scheduler — Coming Soon</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141a2e;
      --accent: #6366f1;
      --accent2: #22d3ee;
      --text: #e6e9f2;
      --muted: #98a1bd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1b2444 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 640px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      border: 1px solid rgba(34,211,238,0.35);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.lead {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .pill {
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      color: #c7cbff;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 14px;
    }
    .foot {
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 20px;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Threadr Hackathon</span>
    <h1>Welcome 👋</h1>
    <p class="lead">
      Auto-scheduling &amp; assigning analysts based on incoming work volume
      and turnaround times. Turn <em>“volume in”</em> → <em>“who does what, by when.”</em>
    </p>
    <div class="pills">
      <span class="pill">Conversational control</span>
      <span class="pill">Smart assignment</span>
      <span class="pill">Turnaround-aware</span>
      <span class="pill">Analyst coaching</span>
    </div>
    <div class="foot">
      <span class="dot"></span> Live frontend placeholder — the real demo is on its way.
    </div>
  </div>
</body>
</html>
